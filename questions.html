<html>


    <head>
            <title>Brooklyn 99 Personality Quiz</title>
            <link rel="stylesheet" href="style.css">
            <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

    </head>

    <body>
        <div class="quiz-screen">
            <h2 class="question">What's your immediete reaction to a crisis?</h2>
            <form>
                <input type="radio" id="ans1" name="qs" value="0">
                <label for="ans1">make a detailed plan to solve it</label>
                <input type="radio" id="ans2" name="qs" value="1">
                <label for="ans2">stress eat</label>
                <input type="radio" id="ans3" name="qs" value="2">
                <label for="ans3">fix it with a crazy stunt</label>
                <input type="radio" id="ans4" name="qs" value="3">
                <label for="ans4">grab a weapon</label>
            </form>

            <div class='footer-container'>
                <button class="back" type="button">BACK</button>
                <h3 class="tracker">1/10</h3>
                <button class="next" type="button">NEXT</button>
            </div>

        </div>
        <div class="mode-icon">
            <img id="theme-image" src="images-b99/moon.png" alt="icon">
        </div>
        <script src="script.js"></script>
    </body>

</html>
